<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard &mdash; AquaTrack</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/pages/dashboard.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="app-shell">
    <header class="navbar" id="navbar"></header>

    <main class="app-shell__content">
      <div class="dashboard-header">
        <div>
          <h1>Dashboard</h1>
          <p>Here's how your water usage looks recently.</p>
        </div>
      </div>

      <div class="grid-4 section">
        <div class="stat-card">
          <div class="stat-card__label">Today's usage <span class="stat-card__icon" style="background:rgba(79,70,229,0.1); color:var(--color-primary);">💧</span></div>
          <div class="stat-card__value" id="stat-today">&mdash;</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Weekly usage <span class="stat-card__icon" style="background:rgba(6,182,212,0.1); color:var(--color-accent);">📅</span></div>
          <div class="stat-card__value" id="stat-week">&mdash;</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Monthly usage <span class="stat-card__icon" style="background:rgba(124,58,237,0.1); color:var(--color-secondary);">🗓️</span></div>
          <div class="stat-card__value" id="stat-month">&mdash;</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Saving score <span class="stat-card__icon" style="background:rgba(16,185,129,0.1); color:var(--color-success);">🌿</span></div>
          <div class="stat-card__value" id="stat-score">&mdash;</div>
        </div>
      </div>

      <div class="grid-3 section">
        <div class="stat-card">
          <div class="stat-card__label">Average consumption</div>
          <div class="stat-card__value" id="stat-avg" style="font-size:1.25rem;">&mdash;</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Highest usage</div>
          <div class="stat-card__value" id="stat-peak" style="font-size:1.25rem;">&mdash;</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Lowest usage</div>
          <div class="stat-card__value" id="stat-lowest" style="font-size:1.25rem;">&mdash;</div>
        </div>
      </div>

      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-card__header">
            <h3>Usage trend</h3>
            <div class="chart-tabs">
              <button class="chart-tab active" data-view="daily">Daily</button>
              <button class="chart-tab" data-view="weekly">Weekly</button>
            </div>
          </div>
          <canvas id="trend-chart" style="width:100%; height:260px;"></canvas>
        </div>

        <div class="chart-card">
          <h3 class="mb-2">Water saving tips</h3>
          <div id="tips-list"></div>
        </div>
      </div>

      <div class="grid-2 section">
        <div class="chart-card">
          <h3 class="mb-2">Log usage quickly</h3>
          <form id="quick-add-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="quick-liters">Liters used</label>
              <input type="number" min="0" step="0.1" id="quick-liters" placeholder="e.g. 45" />
              <div class="form-error" id="quick-liters-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="quick-location">Location (optional)</label>
              <input type="text" id="quick-location" placeholder="e.g. Kitchen" />
            </div>
            <button type="submit" class="btn btn-primary btn-block">Add entry</button>
          </form>
        </div>

        <div class="chart-card">
          <h3 class="mb-2">Recent activity</h3>
          <div id="recent-activity"></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/pages/dashboard.js"></script>
</body>
</html>
