<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in &mdash; AquaTrack</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/pages/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-card__logo">💧 Aqua<span>Track</span></div>
      <p class="auth-card__subtitle">Log in to your dashboard</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
          <div class="form-error" id="email-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" />
          <div class="form-error" id="password-error"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="login-submit">Log in</button>
      </form>

      <p class="auth-card__footer">Don't have an account? <a href="/register.html">Create one</a></p>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
