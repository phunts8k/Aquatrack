<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account &mdash; AquaTrack</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/pages/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-card__logo">💧 Aqua<span>Track</span></div>
      <p class="auth-card__subtitle">Create your account</p>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <input type="text" id="name" name="name" placeholder="Jane Doe" autocomplete="name" />
          <div class="form-error" id="name-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
          <div class="form-error" id="email-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" autocomplete="new-password" />
          <div class="form-error" id="password-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your password" autocomplete="new-password" />
          <div class="form-error" id="confirm-password-error"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="register-submit">Create account</button>
      </form>

      <p class="auth-card__footer">Already have an account? <a href="/login.html">Log in</a></p>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/pages/register.js"></script>
</body>
</html>
