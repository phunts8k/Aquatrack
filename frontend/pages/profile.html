<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile &mdash; AquaTrack</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/pages/profile.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="app-shell">
    <header class="navbar" id="navbar"></header>

    <main class="app-shell__content">
      <div class="dashboard-header">
        <div>
          <h1>Profile</h1>
          <p>Manage your account details and password.</p>
        </div>
      </div>

      <div class="profile-header">
        <div class="profile-avatar" id="profile-avatar-initial">U</div>
        <div>
          <div id="profile-member-since" class="text-muted" style="font-size:0.875rem;"></div>
        </div>
      </div>

      <div class="profile-layout">
        <div class="card">
          <h3 class="mb-3">Account details</h3>
          <form id="profile-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="profile-name">Full name</label>
              <input type="text" id="profile-name" />
              <div class="form-error" id="profile-name-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="profile-email">Email</label>
              <input type="email" id="profile-email" />
              <div class="form-error" id="profile-email-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="profile-goal">Daily usage goal (liters)</label>
              <input type="number" min="1" step="1" id="profile-goal" />
              <div class="form-hint">Used to calculate your water-saving score.</div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Save changes</button>
          </form>
        </div>

        <div class="card">
          <h3 class="mb-3">Change password</h3>
          <form id="password-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="current-password">Current password</label>
              <input type="password" id="current-password" autocomplete="current-password" />
              <div class="form-error" id="current-password-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="new-password">New password</label>
              <input type="password" id="new-password" autocomplete="new-password" />
              <div class="form-error" id="new-password-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="confirm-new-password">Confirm new password</label>
              <input type="password" id="confirm-new-password" autocomplete="new-password" />
              <div class="form-error" id="confirm-new-password-error"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Update password</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/pages/profile.js"></script>
</body>
</html>
